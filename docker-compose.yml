services:
  postgres:
    image: postgres:16-alpine
    container_name: property_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: property_ai
      POSTGRES_USER: property_user
      POSTGRES_PASSWORD: property_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Bootstraps a read-only `property_reader` role on first start.
      # Mirrors what we provision in Supabase for production.
      - ./backend/db/init_reader.sql:/docker-entrypoint-initdb.d/init_reader.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U property_user -d property_ai"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
